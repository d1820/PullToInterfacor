name: Release to Marketplace

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.1.1

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4.0.2
        with:
          node-version: '20.x'
          cache: 'npm'

      - run: npm ci

      - name: Lint and compile
        run: npm run pretest

      - name: Run tests
        run: npm run test-jest

      - name: Stamp version with run number
        run: |
          MAJOR_MINOR=$(node -p "require('./package.json').version" | cut -d. -f1-2)
          npm version "${MAJOR_MINOR}.${{ github.run_number }}" --no-git-tag-version

      - name: Publish to VS Code Marketplace
        run: npx vsce publish --pat ${{ secrets.VSCE_PAT }}
